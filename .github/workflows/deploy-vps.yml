name: Deploy to VPS (prod)

# Despliega a producción cuando se pushea a master.
# El runner self-hosted (cartones-runner) corre en el VPS personal.
#
# Topología del VPS:
#   Internet → Cloudflare → tunnel → nginx-proxy → cartones_backend
# El backend NO expone puertos al host. Joinea la network externa "proxy". 
# En esa misma network vive Keycloak, así que el DNS interno `keycloak:8080` 
# funciona sin red extra. Cloudflare DNS y nginx config se manejan 
# manualmente la primera vez.
#
# Variables y Secrets en GitHub (Settings → Secrets and variables → Actions):
#   Variables requeridas:
#     - FRONTEND_URL                  ej. https://rgq-cartones.eliasg.uk
#     - POSTGRES_DB                   ej. cartones_prod
#     - KEYCLOAK_ISSUER_URI           ej. https://keycloak.eliasg.uk/realms/cartones
#     - KEYCLOAK_JWK_SET_URI          ej. http://keycloak:8080/realms/cartones/protocol/openid-connect/certs
#   Variables opcionales (con defaults sanos en compose / application.yml):
#     - APP_STORAGE_DIRECTORY         default /cartones/storage
#     - HOST_STORAGE_DIR              default /opt/cartones/storage
#     - APP_DB_SCHEMA                 default cartones
#     - APP_PROCESO_ABANDONO_DIAS     default 30 (job marca SIMULADO/PENDIENTE > N días como ABANDONADO)
#     - APP_RATE_LIMIT_UPLOAD_RPM     default 10
#     - APP_RATE_LIMIT_COMPUTE_RPM    default 30
#     - HEALTH_URL                    smoke test público end-to-end opcional
#   Secrets: ninguno (las credenciales DB se leen de /srv/cartones-secrets/).

on:
  push:
    branches: [master]
  workflow_dispatch:

concurrency:
  group: deploy-vps-prod
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: [self-hosted, linux, arm64]
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Verificar entorno
        run: |
          docker --version
          docker compose version
          uname -m
          docker network inspect proxy >/dev/null 2>&1 || {
            echo "::error::La network 'proxy' no existe. Crear ~/infra-claude/vps primero."
            exit 1
          }
          # Keycloak tiene que estar arriba antes del backend — sin él, el
          # backend falla al boot bajando el JWK set y nunca llega a healthy.
          docker inspect -f '{{.State.Status}}' keycloak >/dev/null 2>&1 || {
            echo "::error::El container 'keycloak' no está corriendo. Levantar infra-keycloak primero."
            exit 1
          }
          # Storage del host con permisos correctos (UID 1000 del container).
          # Sin esto el backend tira IllegalStateException al inicializar el
          # directorio de storage y nunca llega a healthy.
          test -d /opt/cartones/storage || {
            echo "::error::Falta /opt/cartones/storage. Crear con: sudo mkdir -p /opt/cartones/storage && sudo chown 1000:1000 /opt/cartones/storage"
            exit 1
          }
          OWNER=$(stat -c '%u:%g' /opt/cartones/storage)
          if [ "$OWNER" != "1000:1000" ]; then
            echo "::error::/opt/cartones/storage tiene owner $OWNER (esperado 1000:1000). Corregir con: sudo chown 1000:1000 /opt/cartones/storage"
            exit 1
          fi

      - name: Provisionar secretos de DB al checkout
        run: |
          mkdir -p secrets_store
          install -m 600 /srv/cartones-secrets/db_user.txt secrets_store/db_user.txt
          install -m 600 /srv/cartones-secrets/db_password.txt secrets_store/db_password.txt

      - name: Generar .env desde GitHub Variables + secretos del VPS
        run: |
          DB_USER=$(cat /srv/cartones-secrets/db_user.txt)
          DB_PASSWORD=$(cat /srv/cartones-secrets/db_password.txt)
          umask 077
          cat > .env <<EOF
          APP_PROFILE=prod
          # `validate` porque `next` usa Flyway para migrar el schema. Si una
          # entity está desincronizada con las migrations, el boot falla rápido
          # en lugar de mutar la tabla silenciosamente.
          DB_DDL_AUTO=validate
          DB_SHOW_SQL=false
          LOG_LEVEL=INFO
          OPEN_IN_VIEW=false
          FRONTEND_URL=${{ vars.FRONTEND_URL }}
          POSTGRES_DB=${{ vars.POSTGRES_DB }}
          SPRING_DATASOURCE_USERNAME=${DB_USER}
          SPRING_DATASOURCE_PASSWORD=${DB_PASSWORD}
          KEYCLOAK_ISSUER_URI=${{ vars.KEYCLOAK_ISSUER_URI }}
          KEYCLOAK_JWK_SET_URI=${{ vars.KEYCLOAK_JWK_SET_URI }}
          # Storage: defaults sanos en compose, pero seteamos explícitos para
          # documentar el contrato. `HOST_STORAGE_DIR` aplica al bind mount;
          # `APP_STORAGE_DIRECTORY` es lo que ve el JVM.
          APP_STORAGE_DIRECTORY=${{ vars.APP_STORAGE_DIRECTORY || '/cartones/storage' }}
          HOST_STORAGE_DIR=${{ vars.HOST_STORAGE_DIR || '/opt/cartones/storage' }}
          APP_DB_SCHEMA=${{ vars.APP_DB_SCHEMA || 'cartones' }}
          APP_PROCESO_ABANDONO_DIAS=${{ vars.APP_PROCESO_ABANDONO_DIAS || '30' }}
          APP_RATE_LIMIT_UPLOAD_RPM=${{ vars.APP_RATE_LIMIT_UPLOAD_RPM || '10' }}
          APP_RATE_LIMIT_COMPUTE_RPM=${{ vars.APP_RATE_LIMIT_COMPUTE_RPM || '30' }}
          EOF

      - name: Deploy con docker compose
        run: |
          docker compose down --remove-orphans || true
          docker compose up -d --build

      - name: Esperar que el backend levante
        run: |
          for i in $(seq 1 30); do
            STATUS=$(docker inspect -f '{{.State.Health.Status}}' cartones_backend 2>/dev/null || echo "starting")
            echo "Intento $i: cartones_backend health=$STATUS"
            if [ "$STATUS" = "healthy" ]; then
              echo "OK"
              exit 0
            fi
            sleep 5
          done
          echo "::error::Backend no llegó a healthy en 150s"
          docker compose ps
          docker compose logs --tail=80 backend
          exit 1

      - name: Smoke test funcional end-to-end
        # Cubre toda la cadena Cloudflare → tunnel → nginx-proxy → backend.
        # Variable HEALTH_URL: cualquier endpoint público que devuelva 2xx
        # (ej: https://cartones.eliasg.uk/actuator/health → JSON con "UP").
        # El healthcheck del contenedor solo prueba localhost; este step
        # detecta nginx hung, tunnel mal ruteado, DNS sin propagar, etc.
        if: vars.HEALTH_URL != ''
        run: |
          URL='${{ vars.HEALTH_URL }}'
          echo "Smoke test → $URL"
          for i in $(seq 1 12); do
            CODE=$(curl -s -o /tmp/smoke.body -w '%{http_code}' --max-time 10 "$URL" || echo 000)
            if [ "$CODE" -ge 200 ] && [ "$CODE" -lt 400 ]; then
              echo "Smoke test OK tras ${i} intento(s) — HTTP $CODE"
              head -c 200 /tmp/smoke.body || true
              exit 0
            fi
            echo "Intento $i — HTTP $CODE; reintento en 10s"
            sleep 10
          done
          echo "::error::Smoke test falló tras 120s — última HTTP=$CODE"
          head -c 500 /tmp/smoke.body || true
          docker compose logs --tail=40 backend
          exit 1

      - name: Limpiar imágenes huérfanas
        if: always()
        run: docker image prune -f --filter "until=24h" || true
