services:
  db:
    image: postgres:16-alpine
    container_name: postgres_cartones_db
    restart: always
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER_FILE: /run/secrets/db_user
      POSTGRES_PASSWORD_FILE: /run/secrets/db_password
    ports:
      - "127.0.0.1:${PORT_DB}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    secrets:
      - source: db_user
        target: db_user
        mode: 0444
      - source: db_password
        target: db_password
        mode: 0444
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $(cat /run/secrets/db_user) -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "5"

  keycloak:
    image: quay.io/keycloak/keycloak:26.1
    container_name: cartones_keycloak
    command: start-dev --import-realm
    environment:
      KC_BOOTSTRAP_ADMIN_USERNAME: ${KEYCLOAK_ADMIN_USER:-admin}
      KC_BOOTSTRAP_ADMIN_PASSWORD: ${KEYCLOAK_ADMIN_PASSWORD:?KEYCLOAK_ADMIN_PASSWORD requerido}
      KC_HTTP_PORT: 8080
      KC_HTTP_ENABLED: "true"
      KC_HEALTH_ENABLED: "true"
      # KC_HOSTNAME define el valor del claim 'iss' en los tokens JWT.
      # En dev local default localhost; en prod debe venir del .env (dominio público).
      KC_HOSTNAME: ${KC_HOSTNAME:-localhost}
      KC_HOSTNAME_PORT: ${PORT_KEYCLOAK:-8080}
      KC_HOSTNAME_STRICT: "false"
      KC_HOSTNAME_STRICT_BACKCHANNEL: "false"
    volumes:
      - ./keycloak/realm-cartones.json:/opt/keycloak/data/import/realm-cartones.json:ro
    ports:
      - "127.0.0.1:${PORT_KEYCLOAK:-8080}:8080"
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:9000/health/ready || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 8
      start_period: 60s
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "5"

  backend:
    build:
      context: .
    container_name: cartones_backend
    restart: always
    environment:
      SERVER_PORT: 9001
      SPRING_PROFILES_ACTIVE: ${APP_PROFILE}

      # Variables inyectadas
      APP_DDL_AUTO: ${DB_DDL_AUTO}
      APP_SHOW_SQL: ${DB_SHOW_SQL}
      APP_LOG_LEVEL: ${LOG_LEVEL}
      APP_OPEN_IN_VIEW: ${OPEN_IN_VIEW}
      APP_CORS_ORIGINS: ${FRONTEND_URL}
      APP_UPLOADS_RATE_LIMIT_RPM: ${APP_UPLOADS_RATE_LIMIT_RPM:-10}

      SPRING_DATASOURCE_URL: jdbc:postgresql://db:5432/${POSTGRES_DB}
      SPRING_CONFIG_IMPORT: "configtree:/run/secrets/"

      # Keycloak: la env del workflow / .env tiene prioridad. Default sirve para dev local.
      # issuer-uri usa hostname público (claim 'iss' del JWT que ve el frontend).
      # jwk-set-uri usa hostname interno Docker para que el backend valide.
      KEYCLOAK_ISSUER_URI: ${KEYCLOAK_ISSUER_URI:-http://localhost:${PORT_KEYCLOAK:-8080}/realms/cartones}
      KEYCLOAK_JWK_SET_URI: ${KEYCLOAK_JWK_SET_URI:-http://keycloak:8080/realms/cartones/protocol/openid-connect/certs}

    ports:
      # Bind a loopback: en prod entra detrás de reverse proxy (nginx/traefik).
      # Para acceso externo directo en dev local, sobreescribir BACKEND_BIND.
      - "${BACKEND_BIND:-127.0.0.1}:${PORT_BACKEND}:9001"
    depends_on:
      db:
        condition: service_healthy
      keycloak:
        condition: service_healthy
    secrets:
      - source: db_user
        target: spring.datasource.username
        mode: 0444
      - source: db_password
        target: spring.datasource.password
        mode: 0444
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://localhost:9001/actuator/health || exit 1"]
      interval: 20s
      timeout: 5s
      retries: 6
      start_period: 60s
    logging:
      driver: json-file
      options:
        max-size: "20m"
        max-file: "10"

volumes:
  postgres_data:

secrets:
  db_user:
    file: ./secrets_store/db_user.txt
  db_password:
    file: ./secrets_store/db_password.txt
