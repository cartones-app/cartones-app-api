services:
  db:
    image: postgres:16-alpine
    container_name: postgres_cartones_db
    restart: always
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER_FILE: /run/secrets/db_user
      POSTGRES_PASSWORD_FILE: /run/secrets/db_password
    ports:
      - "127.0.0.1:${PORT_DB}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    secrets:
      - source: db_user
        target: db_user
        mode: 0444
      - source: db_password
        target: db_password
        mode: 0444
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $(cat /run/secrets/db_user) -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: .
    container_name: cartones_backend
    restart: always
    environment:
      SERVER_PORT: 9001
      SPRING_PROFILES_ACTIVE: ${APP_PROFILE}

      # Variables inyectadas
      APP_DDL_AUTO: ${DB_DDL_AUTO}
      APP_SHOW_SQL: ${DB_SHOW_SQL}
      APP_LOG_LEVEL: ${LOG_LEVEL}
      APP_OPEN_IN_VIEW: ${OPEN_IN_VIEW}
      APP_CORS_ORIGINS: ${FRONTEND_URL}

      SPRING_DATASOURCE_URL: jdbc:postgresql://db:5432/${POSTGRES_DB}
      SPRING_CONFIG_IMPORT: "configtree:/run/secrets/"

      # Keycloak — corre externo a este compose (ver repo cartones-app/infra-keycloak).
      # issuer-uri es lo que el backend valida contra el claim `iss` del JWT;
      # jwk-set-uri es el endpoint que el backend usa para descargar las public keys.
      # En dev local apuntan a localhost:8080 (Keycloak corriendo via infra-keycloak);
      # en prod, al dominio público (ej. https://keycloak.midominio.com/...).
      KEYCLOAK_ISSUER_URI: ${KEYCLOAK_ISSUER_URI}
      KEYCLOAK_JWK_SET_URI: ${KEYCLOAK_JWK_SET_URI}

    ports:
      - "${PORT_BACKEND}:9001"
    depends_on:
      db:
        condition: service_healthy
    networks:
      # Network del proyecto (db + backend, default).
      - default
      # Network donde vive el container de Keycloak (definida en infra-keycloak).
      # El backend usa el DNS interno `keycloak:8080` para bajar las public keys
      # del JWK set. issuer-uri queda como `http://localhost:8080/...` porque
      # eso es lo que dice el claim `iss` del JWT (Spring lo valida por string).
      - keycloak-proxy
      # Network del stack nginx-proxy en el VPS prod. El frontend (en la misma
      # network) resuelve `backend:9001` por DNS interno docker para sus
      # rewrites de /api-proxy/* (ver next.config.ts). En dev local NO existe
      # esta network — el override docker-compose.local.yml la redefine como
      # no-externa para no romper el `up` (queda como red vacía sin uso real,
      # porque en dev el frontend usa network_mode: host).
      - proxy
    secrets:
      - source: db_user
        target: spring.datasource.username
        mode: 0444
      - source: db_password
        target: spring.datasource.password
        mode: 0444

volumes:
  postgres_data:

secrets:
  db_user:
    file: ./secrets_store/db_user.txt
  db_password:
    file: ./secrets_store/db_password.txt

networks:
  default:
  # Network externa creada por el stack de infra-keycloak (override local).
  # El name fijo evita depender de cómo Compose prefije la red según el directorio.
  keycloak-proxy:
    external: true
    name: infra_keycloak_proxy_local
  # Network externa creada por el stack nginx-proxy en el VPS prod (compartida
  # con el frontend). En dev local NO existe — el override docker-compose.local.yml
  # la redefine como no-externa.
  proxy:
    external: true
