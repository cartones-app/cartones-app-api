services:
  db:
    image: postgres:16-alpine
    container_name: postgres_cartones_db
    restart: always
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER_FILE: /run/secrets/db_user
      POSTGRES_PASSWORD_FILE: /run/secrets/db_password
    ports:
      - "127.0.0.1:${PORT_DB}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    secrets:
      - source: db_user
        target: db_user
        mode: 0444
      - source: db_password
        target: db_password
        mode: 0444
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $(cat /run/secrets/db_user) -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5

  keycloak:
    image: quay.io/keycloak/keycloak:26.1
    container_name: cartones_keycloak
    command: start-dev --import-realm
    environment:
      KC_BOOTSTRAP_ADMIN_USERNAME: ${KEYCLOAK_ADMIN_USER:-admin}
      KC_BOOTSTRAP_ADMIN_PASSWORD: ${KEYCLOAK_ADMIN_PASSWORD:?KEYCLOAK_ADMIN_PASSWORD requerido}
      KC_HTTP_PORT: 8080
      KC_HTTP_ENABLED: "true"
      KC_HEALTH_ENABLED: "true"
      # KC_HOSTNAME define el valor del claim 'iss' en los tokens JWT
      KC_HOSTNAME: localhost
      KC_HOSTNAME_PORT: ${PORT_KEYCLOAK:-8080}
      KC_HOSTNAME_STRICT: "false"
      KC_HOSTNAME_STRICT_BACKCHANNEL: "false"
    volumes:
      - ./keycloak/realm-cartones.json:/opt/keycloak/data/import/realm-cartones.json:ro
    ports:
      - "127.0.0.1:${PORT_KEYCLOAK:-8080}:8080"
    # La imagen oficial de Keycloak (UBI minimal) NO incluye curl ni wget,
    # así que un healthcheck con esos binarios siempre falla. Usamos el
    # builtin /dev/tcp de bash: armamos un GET HTTP a /health/ready (puerto
    # de management 9000) y validamos que la primera línea de respuesta sea 200.
    healthcheck:
      test: ["CMD-SHELL", "exec 3<>/dev/tcp/localhost/9000 && printf 'GET /health/ready HTTP/1.0\\r\\nHost: localhost\\r\\n\\r\\n' >&3 && head -n 1 <&3 | grep -q '200'"]
      interval: 15s
      timeout: 10s
      retries: 8
      start_period: 60s

  backend:
    build:
      context: .
    container_name: cartones_backend
    restart: always
    environment:
      SERVER_PORT: 9001
      SPRING_PROFILES_ACTIVE: ${APP_PROFILE}

      # Variables inyectadas
      APP_DDL_AUTO: ${DB_DDL_AUTO}
      APP_SHOW_SQL: ${DB_SHOW_SQL}
      APP_LOG_LEVEL: ${LOG_LEVEL}
      APP_OPEN_IN_VIEW: ${OPEN_IN_VIEW}
      APP_CORS_ORIGINS: ${FRONTEND_URL}

      SPRING_DATASOURCE_URL: jdbc:postgresql://db:5432/${POSTGRES_DB}
      SPRING_CONFIG_IMPORT: "configtree:/run/secrets/"

      # Keycloak: issuer-uri usa localhost (iss del JWT), jwk-set-uri usa hostname interno Docker
      KEYCLOAK_ISSUER_URI: http://localhost:${PORT_KEYCLOAK:-8080}/realms/cartones
      KEYCLOAK_JWK_SET_URI: http://keycloak:8080/realms/cartones/protocol/openid-connect/certs

    ports:
      - "${PORT_BACKEND}:9001"
    depends_on:
      db:
        condition: service_healthy
      keycloak:
        condition: service_healthy
    secrets:
      - source: db_user
        target: spring.datasource.username
        mode: 0444
      - source: db_password
        target: spring.datasource.password
        mode: 0444

volumes:
  postgres_data:

secrets:
  db_user:
    file: ./secrets_store/db_user.txt
  db_password:
    file: ./secrets_store/db_password.txt
