services:
  db:
    image: postgres:16-alpine
    container_name: postgres_cartones_db
    restart: always
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER_FILE: /run/secrets/db_user
      POSTGRES_PASSWORD_FILE: /run/secrets/db_password
    # En VPS: sin "ports:" — el backend habla por la red interna del compose.
    # Para dev local exponer descomentando.
    # ports:
    #   - "127.0.0.1:${PORT_DB}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    secrets:
      - source: db_user
        target: db_user
        mode: 0444
      - source: db_password
        target: db_password
        mode: 0444
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $(cat /run/secrets/db_user) -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "5"

  backend:
    build:
      context: .
    container_name: cartones_backend
    restart: always
    environment:
      SERVER_PORT: 9001
      SPRING_PROFILES_ACTIVE: ${APP_PROFILE}

      APP_DDL_AUTO: ${DB_DDL_AUTO}
      APP_SHOW_SQL: ${DB_SHOW_SQL}
      APP_LOG_LEVEL: ${LOG_LEVEL}
      APP_OPEN_IN_VIEW: ${OPEN_IN_VIEW}
      APP_CORS_ORIGINS: ${FRONTEND_URL}

      SPRING_DATASOURCE_URL: jdbc:postgresql://db:5432/${POSTGRES_DB}
      # Las credenciales vienen del .env (que el workflow genera leyendo
      # /srv/cartones-secrets/). Antes se usaba `configtree:/run/secrets/`
      # con docker secrets, pero el backend corre como user no-root y los
      # secrets se montan 0400 root:root → AccessDenied.
      SPRING_DATASOURCE_USERNAME: ${SPRING_DATASOURCE_USERNAME}
      SPRING_DATASOURCE_PASSWORD: ${SPRING_DATASOURCE_PASSWORD}

    # En VPS: sin "ports:" — entra por nginx-proxy (red "proxy").
    # Para dev local exponer descomentando.
    # ports:
    #   - "${PORT_BACKEND}:9001"
    depends_on:
      db:
        condition: service_healthy
    networks:
      - default
      - proxy
    # Healthcheck básico TCP — el código de master no expone /actuator/health.
    # Cuando se promueva develop a master, cambiar a wget /actuator/health.
    healthcheck:
      test: ["CMD-SHELL", "nc -z localhost 9001 || exit 1"]
      interval: 20s
      timeout: 5s
      retries: 6
      start_period: 60s
    logging:
      driver: json-file
      options:
        max-size: "20m"
        max-file: "10"

volumes:
  postgres_data:

secrets:
  db_user:
    file: ./secrets_store/db_user.txt
  db_password:
    file: ./secrets_store/db_password.txt

networks:
  default:
    # Red interna del compose para que el backend hable con db.
  proxy:
    # Network externa creada por ~/infra-claude/vps (nginx-proxy + cloudflared).
    # nginx-proxy hace proxy_pass http://cartones_backend:9001 según conf.d/<app>.conf
    external: true
