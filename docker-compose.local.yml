# ============================================================================
# Override de desarrollo local.
# ============================================================================
# Usar SIEMPRE con el base:
#   docker compose -f docker-compose.yml -f docker-compose.local.yml up -d
# (o usar `scripts/dev-up.sh` que ya lo hace por nosotros).
#
# Único propósito: hacer que la network externa `proxy` (que en VPS prod es la
# del stack nginx-proxy) sea no-externa en dev — sino el `up` falla con
# "network proxy declared as external, but could not be found". En dev local
# el frontend usa network_mode: host, así que esta red queda vacía y sin uso
# real; pero el backend igual la tiene que tener para que el `networks:` del
# service no rompa.
# ============================================================================

networks:
    proxy:
        external: false
        name: cartones_backend_proxy_local
