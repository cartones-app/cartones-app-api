# Feature flags evaluadas con openflags (https://github.com/eliasss3990/openflags).
#
# El archivo se carga al startup y se recarga en caliente cuando cambia
# (WatchService). En prod (application-prod.yml) se setea
# openflags.file.watch-enabled=false porque el classpath:flags.yml vive
# dentro del launcher JAR y WatchService no puede observar entries de un
# archive — con watch activo dentro del JAR el starter lanza IOException.
# El starter (rc2+) extrae el resource a un temp file 0600 solo con watch=false.
#
# Para sobreescribir valores en runtime sin rebuild, montar un volumen con
# un flags.yml externo y apuntar openflags.file.path en application-*.yml.
#
# Alternativa runtime (preferida): el admin puede pisar cualquier flag desde
# /api/admin/feature-flags (solo rol ADMIN). El override vive en la tabla
# flag_override y tiene prioridad sobre este YAML. El default acá sigue
# siendo el fallback cuando se borra el override.

flags:
  # ============================================================================
  # Excel processing — exposición de detalles de error
  # ============================================================================
  excel.expose-error-details:
    type: boolean
    value: true
    enabled: true
    description: >
      Si true, ExcelProcessingException incluye la lista de errores de validación
      (campo `details` en la respuesta 422). Útil para que el operador corrija
      el Excel ("fila X / vendedor Y inválido"). Si false, solo se devuelve el
      mensaje genérico y los detalles quedan en logs server-side.

  # ============================================================================
  # Módulo ruta — kill switch para emergencia
  # ============================================================================
  ruta.enabled:
    type: boolean
    value: true
    enabled: true
    description: >
      Habilita el módulo ruta (POST /api/ruta/* y /api/admin/ruta/*). Toggleable
      a runtime para desactivar el módulo sin redeploy si se detecta un bug
      crítico. Cuando false, los endpoints siguen existiendo pero devuelven
      503 Service Unavailable.

  # ============================================================================
  # Distribución — A/B test placeholder de algoritmo
  # ============================================================================
  simulacion.algoritmo:
    type: string
    value: legacy
    enabled: true
    description: >
      Selecciona el algoritmo de distribución de cartones. Hoy solo existe
      'legacy'. Cuando se implemente un alternativo ('nuevo'), basta con
      reemplazar este flag por una regla multivariant para hacer A/B test
      sticky por procesoId.

  # ============================================================================
  # Gating de páginas del frontend — controlado desde /admin/feature-flags.
  # Cuando un page.X.enabled es false, el sidebar oculta el item y el acceso
  # directo a la URL muestra un cartel de "Página deshabilitada".
  # ============================================================================
  page.upload.enabled:
    type: boolean
    value: true
    enabled: true
    description: Habilita la página /upload (Nueva distribución).

  page.mis-distribuciones.enabled:
    type: boolean
    value: true
    enabled: true
    description: Habilita la página /mis-distribuciones.

  page.configuracion.enabled:
    type: boolean
    value: true
    enabled: true
    description: Habilita la página /configuracion.

  page.ruta.enabled:
    type: boolean
    value: true
    enabled: true
    description: >
      Habilita la página /ruta. Independiente de ruta.enabled (que es el
      kill-switch del backend) — esto solo afecta la UI.
