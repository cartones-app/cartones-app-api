# ===========================================
# PERFIL PROD (Producción)
# ===========================================

server:
  # Graceful shutdown para Railway
  shutdown: graceful
  # Compresión de respuestas HTTP
  compression:
    enabled: true
    min-response-size: 1024
    mime-types: text/html,application/json

spring:
  lifecycle:
    timeout-per-shutdown-phase: 20s

  # Keycloak como Authorization Server
  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: ${KEYCLOAK_ISSUER_URI}
          jwk-set-uri: ${KEYCLOAK_JWK_SET_URI}

# Logging optimizado para producción
logging:
  level:
    root: INFO
    org.springframework: WARN
    org.hibernate: WARN
    com.zaxxer.hikari: WARN

# ===========================================
# Actuator - Configuración de Producción
# ===========================================
management:
  endpoint:
    health:
      # Solo mostrar detalles cuando esté autorizado (Fase 2: Seguridad)
      show-details: when-authorized

  # Restringir información de entorno sensible
  info:
    env:
      enabled: false

# ===========================================
# openflags — prod
# ===========================================
# Hot reload OFF en prod: el archivo flags.yml viene dentro del JAR y
# WatchService sobre rutas internas de un JAR puede tirar
# UnsupportedOperationException al startup. Para cambios en runtime,
# montar un volumen con un flags.yml externo y apuntar
# openflags.file.path a su path absoluto (entonces sí podés activar
# `watch: true`).
openflags:
  file:
    watch: false
