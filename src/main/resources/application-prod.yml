# ===========================================
# PERFIL PROD (Producción)
# ===========================================

server:
  # Graceful shutdown para Railway
  shutdown: graceful
  # Compresión de respuestas HTTP
  compression:
    enabled: true
    min-response-size: 1024
    mime-types: text/html,application/json

spring:
  lifecycle:
    timeout-per-shutdown-phase: 20s

  # Keycloak como Authorization Server
  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: ${KEYCLOAK_ISSUER_URI}
          jwk-set-uri: ${KEYCLOAK_JWK_SET_URI}

# Logging optimizado para producción
logging:
  level:
    root: INFO
    org.springframework: WARN
    org.hibernate: WARN
    com.zaxxer.hikari: WARN

# ===========================================
# Actuator - Configuración de Producción
# ===========================================
management:
  endpoint:
    health:
      # Solo mostrar detalles cuando esté autorizado (Fase 2: Seguridad)
      show-details: when-authorized

  # Restringir información de entorno sensible
  info:
    env:
      enabled: false

# ===========================================
# openflags — prod
# ===========================================
# El JAR empaquetado por spring-boot-maven-plugin no se puede recorrer
# como filesystem; el starter de openflags 2.0.0-rc1 falla al intentar
# resolver classpath:* dentro del launcher JAR. Workaround: el Dockerfile
# extrae src/main/resources/flags.yml a /app/flags.yml y acá apuntamos
# a ese path absoluto. Hot reload activo: si en runtime se monta un
# volumen sobre /app/flags.yml, los cambios se detectan sin redeploy.
openflags:
  file:
    path: file:/app/flags.yml
    watch: true
